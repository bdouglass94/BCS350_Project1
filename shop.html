<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameZify Shop</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">GameZify</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="cart.html">Cart 🛒</a></li>
      </ul>
    </nav>
  </header>

  <!-- Featured Games / All Games -->
  <section class="featured-games">
    <h2 id="shop-title">All Games</h2>
    <div class="games-grid">
      <div class="game-card" data-platform="playstation">
        <img src="images/game1.jpg" alt="The Last of Us">
        <h3>The Last of Us</h3>
        <p>$59.99</p>
        <button class="add-cart">Add to Cart</button>
      </div>
      <div class="game-card" data-platform="xbox">
        <img src="images/game2.jpg" alt="Halo 3">
        <h3>Halo 3</h3>
        <p>$59.99</p>
        <button class="add-cart">Add to Cart</button>
      </div>
      <div class="game-card" data-platform="switch">
        <img src="images/game3.jpg" alt="The Legend of Zelda">
        <h3>The Legend of Zelda</h3>
        <p>$59.99</p>
        <button class="add-cart">Add to Cart</button>
      </div>
      <!-- Add more game cards here with proper data-platform -->
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 GameZify | Follow us on 
      <a href="#">Instagram</a>, 
      <a href="#">Facebook</a>
    </p>
  </footer>

  <!-- JS -->
  <script>
    // Filter games based on platform query
    const params = new URLSearchParams(window.location.search);
    const platform = params.get('platform'); // "playstation", "xbox", "switch" or null
    const allGames = document.querySelectorAll('.game-card');

    if (platform) {
      allGames.forEach(game => {
        const gamePlatforms = game.dataset.platform.split(' ');
        if (!gamePlatforms.includes(platform)) {
          game.style.display = 'none'; // hide non-matching games
        }
      });
    }
  </script>
</body>
</html>
